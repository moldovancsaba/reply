<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function () {
            try {
                const stored = localStorage.getItem("reply.theme") || "auto";
                const mode = stored === "auto"
                    ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "night" : "day")
                    : stored;
                document.documentElement.dataset.theme = mode;
            } catch {
                document.documentElement.dataset.theme = "night";
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{reply} — Settings</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body class="mode-settings settings-standalone">
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="shell-chrome-group shell-chrome-group--dense">
                    <button id="btn-dash" class="shell-icon-button shell-icon-button--strong" type="button" aria-label="Back to {reply}" data-tooltip="Back to {reply}">
                        <span class="reply-shell-icon" data-icon="dashboard" aria-hidden="true"></span>
                    </button>
                    <button id="btn-settings" class="shell-icon-button" type="button" aria-label="Settings" data-tooltip="Settings">
                        <span class="reply-shell-icon" data-icon="settings" aria-hidden="true"></span>
                    </button>
                    <button id="btn-theme-settings" class="shell-icon-button" type="button" aria-label="Theme: Auto" data-tooltip="Theme: Auto">
                        <span class="reply-shell-icon" data-icon="contrast" aria-hidden="true"></span>
                    </button>
                    <button id="btn-training" class="shell-icon-button" type="button" aria-label="Open training workspace" data-tooltip="Open training workspace">
                        <span class="reply-shell-icon" data-icon="school" aria-hidden="true"></span>
                    </button>
                </div>
                <div id="services-health-status" class="services-health-status" title="Services Health">
                    <span id="services-health-dot" class="status-dot online"></span>
                </div>
                <div id="sync-status" title="Sync Status">
                    <span class="status-dot active"></span>
                </div>
            </div>
            <div class="sidebar-search">
                <input id="contact-search" class="sidebar-search-input" type="search" placeholder="Search contacts..."
                    autocomplete="off" spellcheck="false">
                <label class="u-sr-only" for="conversation-sort">Sort conversations</label>
                <select id="conversation-sort" class="sidebar-sort-select" title="Conversation order"
                    aria-label="Sort conversations">
                    <option value="newest">Newest first</option>
                    <option value="oldest">Oldest first</option>
                    <option value="freq">Interaction frequency</option>
                    <option value="volume_in">Volume (incoming)</option>
                    <option value="volume_out">Volume (outgoing)</option>
                    <option value="volume_total">Volume (total)</option>
                    <option value="recommendation">Recommended</option>
                </select>
            </div>
            <div id="contact-list" class="contact-list">
            </div>
        </aside>

        <main class="chat-area settings-standalone-main">
            <div id="settings-container"></div>
        </main>
    </div>

    <!-- Same feedback shell as index.html (contacts + API use `UI` from ui.js). -->
    <div id="global-spinner" class="spinner-overlay">
        <div class="spinner"></div>
    </div>
    <div id="toast-container"></div>

    <script type="module" src="js/settings.js?v=2.5"></script>
</body>

</html>
