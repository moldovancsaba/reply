name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./chat

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: chat/package-lock.json

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      # reply#34 / reply#31: surface high+ vulns without failing the job until the tree is clean enough to gate.
      - name: npm audit (high; informational)
        run: npm audit --audit-level=high
        continue-on-error: true
